[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["*.py"]
addopts = "-q"
markers = [
    "e2e: contra Gateway real con Docker Compose; usar ADMADC_E2E=1",
    "e2e_security_block: E2E negativo security.blocked (tests/e2e/security_blocked.py)",
    "e2e_qa_fail: E2E negativo qa.failed (tests/e2e/qa_failed.py)",
    "integration: integración sin stack completo (carpeta tests/integration)",
]

[tool.ruff]
line-length = 88
target-version = "py312"
exclude = [
  ".git",
  ".venv",
  "venv",
  "__pycache__",
  "node_modules",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"services/gateway_service/routes/*.py" = ["B008"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unused_configs = true
check_untyped_defs = false
exclude = "(^frontend/|^infrastructure/)"
