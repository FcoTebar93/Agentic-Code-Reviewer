groups:
  - name: admadc_slis
    interval: 30s
    rules:
      - alert: AdmadcTargetDown
        expr: |
          up{job=~"gateway_service|meta_planner|memory_service|dev_service|qa_service|spec_service|security_service|replanner_service|github_service"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Scrape caído: {{ $labels.job }}"
          description: "Prometheus no recibe métricas de este job durante al menos 2m."

      - alert: AdmadcLLMHighErrorRatio
        expr: |
          (
            sum(rate(llm_requests_total{outcome!="ok"}[5m]))
            /
            sum(rate(llm_requests_total[5m]))
          ) > 0.5
          and on() (sum(rate(llm_requests_total[5m])) > 0.01)
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Ratio alto de fallos LLM (>50 % del tráfico en 5m)"
          description: "Umbral provisional; definir SLO en SLIS.md y bajar el ratio en esta regla."

      - alert: AdmadcAgentExecutionP95High
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, service) (rate(agent_execution_time_seconds_bucket[10m]))
          ) > 600
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "p95 agent_execution_time > 600s (servicio {{ $labels.service }})"
          description: "Umbral provisional (10 min); ajustad según SLI 3 en SLIS.md."

      - alert: AdmadcGatewayHttpP99High
        expr: |
          histogram_quantile(
            0.99,
            sum by (le, path) (
              rate(http_request_latency_seconds_bucket{service="gateway_service"}[10m])
            )
          ) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Gateway HTTP p99 > 2s (ruta {{ $labels.path }})"
          description: "Latencia HTTP alta en gateway_service (umbral provisional, revisar con baseline real)."

      - alert: AdmadcGatewayPlanEndpointP99High
        expr: |
          histogram_quantile(
            0.99,
            sum by (le) (
              rate(http_request_latency_seconds_bucket{
                service="gateway_service",
                method="POST",
                path="/api/plan"
              }[10m])
            )
          ) > 1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "POST /api/plan p99 > 1s"
          description: "Endpoint crítico de entrada degradado de forma sostenida (gateway_service)."

      - alert: AdmadcGatewayEventsEndpointP99High
        expr: |
          histogram_quantile(
            0.99,
            sum by (le) (
              rate(http_request_latency_seconds_bucket{
                service="gateway_service",
                method="GET",
                path="/api/events"
              }[10m])
            )
          ) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "GET /api/events p99 > 0.8s"
          description: "Endpoint de eventos degradado de forma sostenida (gateway_service)."

      - alert: AdmadcGatewayPlanDetailEndpointP99High
        expr: |
          histogram_quantile(
            0.99,
            sum by (le) (
              rate(http_request_latency_seconds_bucket{
                service="gateway_service",
                method="GET",
                path="/api/plan_detail/{plan_id}"
              }[10m])
            )
          ) > 1.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "GET /api/plan_detail/{plan_id} p99 > 1.2s"
          description: "Endpoint de detalle de plan degradado de forma sostenida (gateway_service)."

      - alert: AdmadcGatewayPlanEndpoint5xxRatioHigh
        expr: |
          (
            sum(rate(http_request_latency_seconds_count{
              service="gateway_service",
              method="POST",
              path="/api/plan",
              status_code=~"5.."
            }[10m]))
            /
            (
              sum(rate(http_request_latency_seconds_count{
                service="gateway_service",
                method="POST",
                path="/api/plan"
              }[10m])) + 1e-9
            )
          ) > 0.05
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "POST /api/plan ratio 5xx > 5%"
          description: "Error rate 5xx sostenido en endpoint crítico de entrada."

      - alert: AdmadcGatewayEventsEndpoint5xxRatioHigh
        expr: |
          (
            sum(rate(http_request_latency_seconds_count{
              service="gateway_service",
              method="GET",
              path="/api/events",
              status_code=~"5.."
            }[10m]))
            /
            (
              sum(rate(http_request_latency_seconds_count{
                service="gateway_service",
                method="GET",
                path="/api/events"
              }[10m])) + 1e-9
            )
          ) > 0.03
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "GET /api/events ratio 5xx > 3%"
          description: "Error rate 5xx sostenido en endpoint de eventos."

      - alert: AdmadcGatewayPlanDetailEndpoint5xxRatioHigh
        expr: |
          (
            sum(rate(http_request_latency_seconds_count{
              service="gateway_service",
              method="GET",
              path="/api/plan_detail/{plan_id}",
              status_code=~"5.."
            }[10m]))
            /
            (
              sum(rate(http_request_latency_seconds_count{
                service="gateway_service",
                method="GET",
                path="/api/plan_detail/{plan_id}"
              }[10m])) + 1e-9
            )
          ) > 0.03
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "GET /api/plan_detail/{plan_id} ratio 5xx > 3%"
          description: "Error rate 5xx sostenido en endpoint de detalle de plan."

      - alert: AdmadcTasksFailedRateHigh
        expr: |
          sum(rate(tasks_failed_total[15m])) > 0.02
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Tasa de tasks_failed_total elevada"
          description: "Se detectan fallos de tareas sostenidos en la ventana de 15m."
