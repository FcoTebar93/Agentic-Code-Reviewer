global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
      scheme: http
      timeout: 10s

rule_files:
  - /etc/prometheus/rules/slis_alerts.yml
  - /etc/prometheus/rules/meta_alerts.yml
  - /etc/prometheus/rules/agent_alerts.yml

scrape_configs:
  - job_name: "gateway_service"
    static_configs:
      - targets: ["gateway_service:8000"]
    metrics_path: /metrics

  - job_name: "meta_planner"
    static_configs:
      - targets: ["meta_planner:8000"]
    metrics_path: /metrics

  - job_name: "dev_service"
    static_configs:
      - targets: ["dev_service:8000"]
    metrics_path: /metrics

  - job_name: "qa_service"
    static_configs:
      - targets: ["qa_service:8000"]
    metrics_path: /metrics

  - job_name: "security_service"
    static_configs:
      - targets: ["security_service:8000"]
    metrics_path: /metrics

  - job_name: "github_service"
    static_configs:
      - targets: ["github_service:8000"]
    metrics_path: /metrics

  - job_name: "memory_service"
    static_configs:
      - targets: ["memory_service:8000"]
    metrics_path: /metrics

  - job_name: "replanner_service"
    static_configs:
      - targets: ["replanner_service:8000"]
    metrics_path: /metrics

  - job_name: "spec_service"
    static_configs:
      - targets: ["spec_service:8000"]
    metrics_path: /metrics

  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    metrics_path: /metrics

  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
    metrics_path: /metrics
